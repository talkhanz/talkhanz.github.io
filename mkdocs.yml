site_name: ML Research Notes
site_description: A blog on AI and machine learning research.
site_author: Your Name
# IMPORTANT: replace YOUR_USERNAME everywhere below with your GitHub username.
# This is configured as a USER SITE: the repo must be named YOUR_USERNAME.github.io
# and the site is served at the domain root (no subpath).
site_url: https://YOUR_USERNAME.github.io/
repo_url: https://github.com/YOUR_USERNAME/YOUR_USERNAME.github.io
repo_name: YOUR_USERNAME/YOUR_USERNAME.github.io

theme:
  name: material
  icon:
    logo: material/brain
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - blog:
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      post_excerpt: optional
      archive: true
      categories: true
      pagination_per_page: 10
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags

markdown_extensions:
  # Math (LaTeX) via MathJax
  - pymdownx.arithmatex:
      generic: true
  # Code blocks, tabs, admonitions
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Inline HTML fragments (used to embed interactive Plotly charts)
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - About: about.md
